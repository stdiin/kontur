<!DOCTYPE html>
<html lang="pl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Kontur</title>
   <link rel="stylesheet" href="style.css">
   <script type="module" src="dist/main.js" defer></script>
</head>
<body>
   <div id="main-menu">
      <span class="title">Kontur</span>
      <div class="buttons">
         <button id="play-button">Graj</button>
         <button>Ustawienia</button>
      </div>
   </div>

   <div id="game" class="hidden">
      <div class="topbar">
         <div class="controls">
            <span>test</span>
            <button>Sprawdź</button>
         </div>
         <button id="leave-button">Wróć do menu</button>
      </div>
      <canvas id="map"></canvas>
   </div>

   <div id="editor" class="hidden">
      
   </div>

   <div id="map-selector" class="hidden">
      <div>
         <label for="map-upload">Importuj mapę z pliku</label>
         <input type="file" id="map-upload" accept=".map.json">
      </div>
   </div>

   <div id="settings" class="hidden">
      <input type="checkbox" name="" id="">
      <input type="checkbox" name="" id="">
      <input type="checkbox" name="" id="">
   </div>
</body>
</html>
